<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a8e"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Bengali letter ভ (first letter of ভাড়া কত) -->
  <text x="256" y="310" font-family="'Noto Sans Bengali', sans-serif" font-size="280" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">ভ</text>
  <!-- Small taka symbol -->
  <text x="410" y="420" font-family="sans-serif" font-size="100" font-weight="700" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">৳</text>
</svg>
